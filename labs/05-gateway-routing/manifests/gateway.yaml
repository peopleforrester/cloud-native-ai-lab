# ABOUTME: Gateway resource for inference routing using the Gateway API Inference Extension.
# ABOUTME: Creates a gateway entry point with an HTTPRoute that targets an InferencePool.

apiVersion: v1
kind: Namespace
metadata:
  name: inference-demo
---
# The Gateway is the entry point for inference traffic.
# It uses the standard Gateway API spec — the inference extension hooks
# into the gateway's processing pipeline to add model-aware routing.
#
# In production, you would use a GatewayClass backed by Envoy Gateway,
# Istio, or another Gateway API implementation that supports the
# inference extension.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: inference-demo
spec:
  # gatewayClassName must reference a GatewayClass that supports the
  # inference extension. Envoy Gateway has built-in support.
  # On kind without Envoy Gateway installed, this resource will be
  # created but not reconciled by a controller.
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
# The HTTPRoute connects the Gateway to the InferencePool.
# Requests matching this route are forwarded to the pool, where the
# inference extension's endpoint picker selects the best pod.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inference-route
  namespace: inference-demo
spec:
  parentRefs:
    # Attach this route to the inference gateway.
    - name: inference-gateway
      namespace: inference-demo
  rules:
    - matches:
        # Match POST requests to the OpenAI-compatible chat completions
        # endpoint. The inference extension reads the model name from the
        # request body to determine which InferenceObjective applies.
        - path:
            type: PathPrefix
            value: /v1
          method: POST
      backendRefs:
        # Reference the InferencePool instead of a regular Service.
        # The gateway treats this as a backend but delegates pod selection
        # to the inference extension's endpoint picker.
        - group: inference.networking.x-k8s.io
          kind: InferencePool
          name: llm-pool
          port: 8000
