# ABOUTME: Pod that consumes a GPU device through a DRA ResourceClaim.
# ABOUTME: Demonstrates the pod-side integration for Dynamic Resource Allocation.
apiVersion: v1
kind: Pod
metadata:
  name: gpu-consumer
spec:
  containers:
    - name: worker
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - |
          echo "Pod started with claimed GPU device"
          echo "In a real scenario, CUDA libraries and GPU device nodes"
          echo "would be mounted into this container by the DRA driver."
          echo "Simulating GPU work..."
          sleep 60
          echo "Work complete"
      # resourceClaims are referenced here to make the device available
      # to this specific container. A pod can have multiple containers,
      # and you control which containers get access to which devices.
      resources:
        claims:
          - name: gpu
            # The request name must match a request defined in the
            # ResourceClaim's spec.devices.requests list.
            request: gpu-request

  # resourceClaims at the pod level binds a ResourceClaim to this pod.
  # The name here ("gpu") is what containers reference in resources.claims.
  resourceClaims:
    - name: gpu
      # Option 1: Reference an existing ResourceClaim by name.
      resourceClaimName: gpu-claim

      # Option 2: Use a template to create a new claim per pod.
      # Uncomment the following and comment out resourceClaimName above
      # to use template-based allocation:
      #
      # resourceClaimTemplateName: gpu-claim-template

  restartPolicy: Never
