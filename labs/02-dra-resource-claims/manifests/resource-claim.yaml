# ABOUTME: ResourceClaim requesting a single GPU device from the simulated-gpu class.
# ABOUTME: Demonstrates how pods declare fine-grained device requirements via DRA.
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: gpu-claim
spec:
  devices:
    # Each request in the list describes one device the pod needs.
    requests:
      - name: gpu-request
        exactly:
          deviceClassName: simulated-gpu
          # selectors add constraints beyond what the DeviceClass defines.
          # For example, you could require specific attributes:
          #   selectors:
          #     - cel:
          #         expression: 'device.attributes["nvidia.com"].memoryMiB >= 40960'
          #
          # Without additional selectors, any device matching the DeviceClass
          # satisfies this request.
