# ABOUTME: kagent Agent CRD defining an AI agent with LLM config and tool sources.
# ABOUTME: Represents a Kubernetes-native agent that can use MCP servers as tools.

apiVersion: kagent.dev/v1alpha1
kind: Agent
metadata:
  name: k8s-helper
  namespace: agents
spec:
  # description is a human-readable summary of what this agent does.
  # It appears in dashboards and tool listings.
  description: "A Kubernetes helper agent that can inspect cluster state and suggest fixes."

  # model configures which LLM the agent uses for reasoning.
  model:
    # provider identifies the LLM backend (openai, anthropic, ollama, etc.)
    provider: openai
    # name is the model identifier. Use the actual model name from your provider.
    name: gpt-4o
    # apiEndpoint is where the LLM API is hosted.
    # For local models (Ollama), use http://ollama.default.svc.cluster.local:11434
    # For cloud models, use the provider's API endpoint.
    apiEndpoint: https://api.openai.com/v1
    # apiKeySecret references a Kubernetes Secret containing the API key.
    # The secret must exist in the same namespace as the Agent.
    apiKeySecret:
      name: llm-api-key
      key: api-key

  # systemPrompt defines the agent's behavior and personality.
  # This is the system message sent to the LLM with every conversation.
  systemPrompt: |
    You are a Kubernetes cluster assistant. You help operators understand
    cluster state, diagnose issues, and suggest fixes.

    Rules:
    - Always explain what you are about to do before taking an action.
    - Never delete resources without explicit confirmation.
    - When diagnosing issues, check events, pod status, and logs in that order.
    - Provide kubectl commands that the user can run manually as an alternative.

  # mcpServers lists the MCP server resources this agent can access.
  # Each entry references an MCPServer resource in the same namespace.
  mcpServers:
    - name: kubernetes-tools
