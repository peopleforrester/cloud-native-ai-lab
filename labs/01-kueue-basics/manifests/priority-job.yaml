# ABOUTME: High-priority Job that triggers Kueue preemption of lower-priority work.
# ABOUTME: Uses a PriorityClass and workload-priority-class label for Kueue ordering.
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority
value: 1000
globalDefault: false
description: "High priority class for urgent workloads"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: low-priority
value: 100
globalDefault: false
description: "Low priority class for batch workloads"
---
apiVersion: batch/v1
kind: Job
metadata:
  generateName: priority-job-
  labels:
    kueue.x-k8s.io/queue-name: team-a-lq
    kueue.x-k8s.io/priority-class: high-priority
spec:
  parallelism: 1
  completions: 1
  suspend: true
  template:
    spec:
      priorityClassName: high-priority
      containers:
        - name: urgent-worker
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "HIGH PRIORITY job started at $(date)"
              echo "This job preempted lower-priority workloads"
              sleep 20
              echo "HIGH PRIORITY job completed at $(date)"
          resources:
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 2Gi
      restartPolicy: Never
  backoffLimit: 0
