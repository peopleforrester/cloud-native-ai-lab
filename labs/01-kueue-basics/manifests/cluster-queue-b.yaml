# ABOUTME: ClusterQueue for team-b with 2 CPU and 4Gi memory quota.
# ABOUTME: Smaller quota than team-a to demonstrate fair sharing between teams.
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: team-b-cq
spec:
  namespaceSelector: {}
  preemption:
    reclaimWithinCohort: Any
    withinClusterQueue: LowerPriority
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        - name: default-cpu
          resources:
            - name: cpu
              nominalQuota: "2"
            - name: memory
              nominalQuota: 4Gi
