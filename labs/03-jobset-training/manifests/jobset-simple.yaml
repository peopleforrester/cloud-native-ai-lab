# ABOUTME: Simple JobSet with 2 worker replicas simulating distributed training.
# ABOUTME: Demonstrates coordinated startup and failure handling without Kueue.
apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: training-sim
spec:
  # failurePolicy controls what happens when a child Job fails.
  # maxRestarts: 2 means JobSet will recreate all child Jobs up to 2 times
  # before marking the entire JobSet as failed.
  failurePolicy:
    maxRestarts: 2

  replicatedJobs:
    - name: workers
      # replicas creates this many identical Jobs.
      # Each Job runs one pod, so replicas: 2 means 2 worker pods.
      replicas: 2
      template:
        spec:
          parallelism: 1
          completions: 1
          backoffLimit: 0
          template:
            spec:
              containers:
                - name: worker
                  image: busybox:1.36
                  command: ["sh", "-c"]
                  args:
                    - |
                      WORKER_INDEX=${JOB_COMPLETION_INDEX:-0}
                      echo "Worker ${WORKER_INDEX} starting"
                      echo "Hostname: $(hostname)"
                      echo "Simulating distributed training epoch 1/3..."
                      sleep 20
                      echo "Simulating distributed training epoch 2/3..."
                      sleep 20
                      echo "Simulating distributed training epoch 3/3..."
                      sleep 20
                      echo "Worker ${WORKER_INDEX} training complete"
                  resources:
                    requests:
                      cpu: "250m"
                      memory: 256Mi
                    limits:
                      cpu: "500m"
                      memory: 512Mi
              restartPolicy: Never
